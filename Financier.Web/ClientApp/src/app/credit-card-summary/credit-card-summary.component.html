<div class="credit-card">
  <div class="account-header" (click)="toggleTransactionsVisibility()">
    <span class="account-name">{{ name }}</span>
    <span class="account-balance">${{ balance | number : '1.2-2' }}</span>
  </div>
  <table class='table' *ngIf="areTransactionsVisible">
    <thead>
      <tr>
        <th>Date</th>
        <th>Description</th>
        <th>Amount</th>
        <th>Running Balance</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let transaction of visibleTransactions">
        <td>{{ transaction.at | date : 'mediumDate' }}</td>
        <td>{{ transaction.otherAccountName }}</td>
        <td>{{ transaction.amount | number : '1.2-2' }}</td>
        <td>{{ transaction.runningBalance | number : '1.2-2' }}</td>
      </tr>
    </tbody>
  </table>
</div>
